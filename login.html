<!DOCTYPE html>
<html>
<head>
    <title>Smart Brains - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Smart Brains</h1>

<div class="container">
    <h2 id="formTitle">Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="email" id="email" placeholder="Email" style="display:none">
    <input type="password" id="password" placeholder="Password">

    <button onclick="submitForm()">Login</button>
    <p style="color: black;">
        Don't have an account? 
        <a href="#" onclick="toggleForm()" style="color:rgb(37, 37, 35, 48, 45);">Register</a>
    </p>

    <p id="message" style="color:red;"></p>
</div>

<script>
    const API = "http://localhost:8080/api/auth";
    let isLogin = true;

    function toggleForm() {
        isLogin = !isLogin;
        document.getElementById("formTitle").innerText = isLogin ? "Login" : "Register";
        document.getElementById("email").style.display = isLogin ? "none" : "block";
        document.querySelector("button").innerText = isLogin ? "Login" : "Register";
        document.querySelector("p a").innerText = isLogin ? "Register" : "Login";
        document.querySelector("p").childNodes[1].textContent = isLogin ? "Don't have an account? " : "Already have an account? ";
    }

    function submitForm() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const email = document.getElementById("email").value;

        if (!username || !password) {
            document.getElementById("message").innerText = "Please fill in all fields!";
            return;
        }

        const url = isLogin ? `${API}/login` : `${API}/register`;
        const body = isLogin
            ? { username, password }
            : { username, password, email };

        fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                document.getElementById("message").innerText = data.error;
            } else if (isLogin) {
                localStorage.setItem("token", data.token);
                localStorage.setItem("username", data.username);
                window.location.href = "index.html";
            } else {
                document.getElementById("message").style.color = "green";
                document.getElementById("message").innerText = "Registered! Please login.";
                toggleForm();
            }
        })
        .catch(err => {
            document.getElementById("message").innerText = "Connection error!";
        });
    }
</script>

</body>
</html>
